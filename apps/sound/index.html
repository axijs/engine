<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="/src/styles.css" rel="stylesheet">
  <title>sound</title>
</head>
<body>
<header class="container">
  <hgroup>
    <h1>Sound System Playground</h1>
  </hgroup>
</header>

<main class="container">
  <div id="app">
    <section>
      <h2>Sequences</h2>
      <section>
        <div>
          <h4>Default</h4>
          <button id="play">Play</button>
          <button id="stop" disabled>Stop</button>
        </div>
      </section>
      <section>
        <div>
          <h4>Easing</h4>
          <button id="play-easing" >Play</button>
          <button id="stop-easing" disabled>Stop</button>
        </div>
      </section>

      <section>
        <div>
          <h4>Loop</h4>
          <button id="play-loop">Play</button>
          <button id="stop-loop" disabled>Stop</button>
        </div>
      </section>
    </section>
  </div>
</main>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
