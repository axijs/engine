<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="/src/styles.css" rel="stylesheet">
  <title>sound</title>
</head>
<body>
<header class="container">
  <hgroup>
    <h1>Sound System Playground</h1>
  </hgroup>
</header>

<main class="container">
  <div id="app">
    <h2>Sequences</h2>
    <section>
      <section>
        <div class="grid">
          <div>
            <h4>Default</h4>
            <button id="play">Play</button>
            <button id="stop" disabled>Stop</button>
          </div>
          <div>
            <h4>Default Loop</h4>
            <button id="play-loop">Play</button>
            <button id="stop-loop" disabled>Stop</button>
          </div>
        </div>
      </section>

      <section>
        <div class="grid">
          <div>
            <h4>Queue</h4>
            <button id="play-queue">Play</button>
            <button id="stop-queue" disabled>Stop</button>
          </div>
          <div>
            <h4>Queue Loop</h4>
            <button id="play-queue-loop">Play</button>
            <button id="stop-queue-loop" disabled>Stop</button>
          </div>
        </div>
      </section>
      <section>
        <div>
          <h4>Restart On Play</h4>
          <button id="play-restart">Play</button>
          <button id="stop-restart" disabled>Stop</button>
        </div>
      </section>

      <section>
        <div>
          <h4>Easing</h4>
          <button id="play-easing">Play</button>
          <button id="pause-easing" disabled>Pause</button>
          <button id="resume-easing" disabled>Resume</button>
          <button id="stop-easing" disabled>Stop</button>
        </div>
      </section>

      <section>
        <div>
          <h4>Channel</h4>
          <div class="grid">
            <div> Queue: <span id="cnl-queue">0</span> of 5</div>
            <div> Volume: <span id="cnl-volume">1</span></div>
          </div>
          <hr>
          <div>
            <button id="cnl-play">Play</button>
            <button id="cnl-play-long">Play Long</button>

            <button id="cnl-pause">Pause</button>
            <button id="cnl-resume">Resume</button>
            <button id="cnl-stop">Stop</button>
            <button id="cnl-volume-05">Volume 0.5</button>
            <button id="cnl-volume-1">Volume 1.0</button>
          </div>
        </div>
      </section>

      <section>
        <div>
          <h4>Save And Restore</h4>
          <button id="save-test-play">Play</button>
          <button id="save" disabled>Save</button>
          <button id="restore" disabled>Restore</button>
        </div>
      </section>
    </section>
  </div>
</main>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
